name: Dropbox Integration Live Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/dropbox-audit.yml']

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 0. Setup ──────────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 1. GET diagnostic – is the function deployed and are env vars present? ─
      - name: "STEP 1 — GET /api/upload-to-dropbox (diagnostic)"
        id: diag
        run: |
          echo "### STEP 1 — Function deployed + env vars" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          RESPONSE=$(curl -sS -w "\n---HTTP_STATUS: %{http_code}" \
            "https://ink-seal-notary-pros-website.vercel.app/api/upload-to-dropbox")

          echo "$RESPONSE" | tee -a /dev/stderr >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | awk -F': ' '{print $2}')
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT

          if [ "$STATUS" != "200" ]; then
            echo "❌ Function not reachable — HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ Function reachable — HTTP $STATUS" >> $GITHUB_STEP_SUMMARY

      # ── 2. POST live submission with one test file ────────────────────────────
      - name: "STEP 2 — POST /api/upload-to-dropbox (live test submission)"
        id: post
        run: |
          echo "### STEP 2 — Live POST to upload-to-dropbox" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          ORDER="GH-AUDIT-$TIMESTAMP"
          CLIENT="GitHub-Audit-Test"

          # Build a small base64-encoded text file as the test document
          FILE_CONTENT="Ink & Seal Notary Pros — Dropbox Integration Audit
Timestamp : $TIMESTAMP
Order     : $ORDER
Source    : GitHub Actions live audit workflow
Purpose   : Proves end-to-end Dropbox integration is functional
"
          B64=$(echo "$FILE_CONTENT" | base64 -w 0)

          PAYLOAD=$(jq -n \
            --arg cn "$CLIENT" \
            --arg on "$ORDER" \
            --arg fname "AUDIT_${TIMESTAMP}.txt" \
            --arg fdata "data:text/plain;base64,$B64" \
            '{clientName: $cn, orderNumber: $on, files: [{name: $fname, data: $fdata}]}')

          echo "Order number : $ORDER"
          echo "Client name  : $CLIENT"
          echo "Payload size : $(echo "$PAYLOAD" | wc -c) bytes"
          echo ""

          RESPONSE=$(curl -sS -w "\n---HTTP_STATUS: %{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://ink-seal-notary-pros-website.vercel.app/api/upload-to-dropbox")

          echo "$RESPONSE" | tee -a /dev/stderr >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | awk -F': ' '{print $2}')
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "http_status=$STATUS"   >> $GITHUB_OUTPUT
          echo "order_number=$ORDER"   >> $GITHUB_OUTPUT
          echo "response_body=$BODY"   >> $GITHUB_OUTPUT

          SUCCESS=$(echo "$BODY" | jq -r '.success // "null"' 2>/dev/null)
          FOLDER=$(echo  "$BODY" | jq -r '.folderLink // "none"' 2>/dev/null)
          UPLOADS=$(echo "$BODY" | jq -r '.uploadCount // "0"' 2>/dev/null)
          ERROR=$(echo   "$BODY" | jq -r '.error // "none"' 2>/dev/null)

          echo ""
          echo "HTTP status  : $STATUS"
          echo "success      : $SUCCESS"
          echo "folderLink   : $FOLDER"
          echo "uploadCount  : $UPLOADS"
          echo "error        : $ERROR"

          if [ "$STATUS" = "200" ] && [ "$SUCCESS" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Upload succeeded — HTTP $STATUS**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| HTTP Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| success | $SUCCESS |" >> $GITHUB_STEP_SUMMARY
            echo "| orderNumber | $ORDER |" >> $GITHUB_STEP_SUMMARY
            echo "| uploadCount | $UPLOADS |" >> $GITHUB_STEP_SUMMARY
            echo "| folderLink | $FOLDER |" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Upload FAILED — HTTP $STATUS**" >> $GITHUB_STEP_SUMMARY
            echo "error: $ERROR" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 3. Direct Dropbox OAuth token check (independent of Vercel) ──────────
      - name: "STEP 3 — Direct Dropbox OAuth token (if secrets available)"
        env:
          DROPBOX_APP_KEY:      ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET:   ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          echo "### STEP 3 — Direct Dropbox OAuth token request" >> $GITHUB_STEP_SUMMARY

          if [ -z "$DROPBOX_APP_KEY" ] || [ -z "$DROPBOX_APP_SECRET" ] || [ -z "$DROPBOX_REFRESH_TOKEN" ]; then
            echo "⚠️ Dropbox secrets not stored in GitHub — skipping direct OAuth test." >> $GITHUB_STEP_SUMMARY
            echo "   (Secrets live in Vercel only. Steps 1–2 above test the full path.)" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ To enable this step: add DROPBOX_APP_KEY, DROPBOX_APP_SECRET, DROPBOX_REFRESH_TOKEN to GitHub repo secrets." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY

          RESPONSE=$(curl -sS -w "\n---HTTP_STATUS: %{http_code}" \
            -X POST "https://api.dropboxapi.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${DROPBOX_REFRESH_TOKEN}&client_id=${DROPBOX_APP_KEY}&client_secret=${DROPBOX_APP_SECRET}")

          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | awk -F': ' '{print $2}')
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          # Redact the access token before logging
          SAFE_BODY=$(echo "$BODY" | sed 's/"access_token":"[^"]*"/"access_token":"[REDACTED]"/g')
          echo "HTTP $STATUS"
          echo "$SAFE_BODY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ "$STATUS" = "200" ]; then
            echo "✅ OAuth token refresh HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ OAuth token refresh FAILED HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 4. Retrieve Vercel function logs via Vercel API (if token present) ───
      - name: "STEP 4 — Pull Vercel function logs (if VERCEL_TOKEN present)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          echo "### STEP 4 — Vercel function logs" >> $GITHUB_STEP_SUMMARY

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN not stored in GitHub secrets — cannot pull runtime logs." >> $GITHUB_STEP_SUMMARY
            echo "   To enable: add VERCEL_TOKEN to GitHub repo secrets." >> $GITHUB_STEP_SUMMARY
            echo "   Get your token: https://vercel.com/account/tokens" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY

          # Get the project deployments list
          echo "Fetching recent Vercel deployments..."
          DEPLOYMENTS=$(curl -sS \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=ink-seal-notary-pros-website&limit=3")

          echo "$DEPLOYMENTS" | jq '{deployments: [.deployments[] | {uid, url, state, createdAt, readyAt}]}' 2>/dev/null || echo "$DEPLOYMENTS"

          # Get the latest deployment UID
          DEPLOY_UID=$(echo "$DEPLOYMENTS" | jq -r '.deployments[0].uid // empty')

          if [ -n "$DEPLOY_UID" ]; then
            echo "Latest deployment: $DEPLOY_UID"
            echo ""

            # Pull runtime logs for the upload-to-dropbox function
            echo "Runtime logs for /api/upload-to-dropbox:"
            curl -sS \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v2/deployments/$DEPLOY_UID/events?limit=50&type=stdout,stderr" \
              | jq -r '.[-20:] | .[] | "\(.type | ascii_upcase) \(.date) \(.text)"' 2>/dev/null
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── 5. Summary ───────────────────────────────────────────────────────────
      - name: "STEP 5 — Final audit summary"
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## Final Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Function deployed at /api/upload-to-dropbox | Step 1 HTTP status |" >> $GITHUB_STEP_SUMMARY
          echo "| Env vars present (APP_KEY, SECRET, TOKEN) | Step 1 diagnostic JSON |" >> $GITHUB_STEP_SUMMARY
          echo "| POST with test file returns HTTP 200 | Step 2 response |" >> $GITHUB_STEP_SUMMARY
          echo "| folderLink returned | Step 2 response body |" >> $GITHUB_STEP_SUMMARY
          echo "| uploadCount > 0 | Step 2 response body |" >> $GITHUB_STEP_SUMMARY
          echo "| OAuth token refresh direct | Step 3 (needs GitHub secret) |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel runtime logs | Step 4 (needs VERCEL_TOKEN secret) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered: $(date -u)" >> $GITHUB_STEP_SUMMARY
